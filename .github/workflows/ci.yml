name: CI

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README'
      - 'COPYRIGHT'
      - 'LICENSE-*'
      - '**.md'
      - '**.txt'
  pull_request:
    paths-ignore:
      - 'README'
      - 'COPYRIGHT'
      - 'LICENSE-*'
      - '**.md'
      - '**.txt'
  workflow_dispatch:
  schedule:
    - cron: "0 1 1 * *"

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings
  RUST_BACKTRACE: 1

jobs:
  # Check formatting (platform-independent, one OS is enough).
  # Nightly toolchain: rustfmt.toml sets `imports_granularity = "Crate"`, an unstable
  # rustfmt option only the nightly formatter understands.
  rustfmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Install nightly Rust
      run: rustup toolchain install nightly --component rustfmt
    - name: Check formatting
      run: cargo +nightly fmt --all -- --check

  # Apply clippy lints across the feature sweep
  clippy:
    name: clippy
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v6
    - name: Install protoc
      uses: arduino/setup-protoc@v3
      with:
        repo-token: ${{ secrets.GITHUB_TOKEN }}
    - name: Install Rust
      # --no-self-update is necessary because the windows environment cannot self-update rustup.exe.
      run: rustup update stable --no-self-update && rustup default stable && rustup component add clippy
    - name: Install cargo-hack
      run: cargo install cargo-hack
    - name: Apply clippy lints
      # The crate needs std-or-alloc (a compile_error! enforces it); --at-least-one-of keeps the
      # sweep off the impossible bare combos (e.g. `tcp` alone) while still covering every feature.
      run: cargo hack clippy --feature-powerset --depth 2 --exclude-features fuzzing --at-least-one-of std,alloc

  # Run tests on some extra platforms
  cross:
    name: cross
    strategy:
      # One target failing should not cancel the others — we want the full portability picture.
      fail-fast: false
      matrix:
        target:
          - aarch64-unknown-linux-gnu
          - aarch64-linux-android
          - aarch64-unknown-linux-musl
          - i686-linux-android
          - x86_64-linux-android
          - i686-pc-windows-gnu
          - x86_64-pc-windows-gnu
          - i686-unknown-linux-gnu
          - powerpc64-unknown-linux-gnu
          - riscv64gc-unknown-linux-gnu
          - wasm32-unknown-unknown
          - wasm32-unknown-emscripten
          - wasm32-wasip1
          - wasm32-wasip1-threads
          - wasm32-wasip2
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Cache cargo build and registry
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cross-${{ hashFiles('Cargo.toml', '*/Cargo.toml', 'tests/*/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cross-
      - name: Install Rust
        run: rustup update stable && rustup default stable
      - name: cargo build --target ${{ matrix.target }}
        run: |
          rustup target add ${{ matrix.target }}
          # The driver crates are the platform-bound I/O layer — compio's proactor backends
          # (io_uring/IOCP/kqueue) and the reactor's agnostic/socket2 readiness sockets — so
          # cross-portability is the protocol crate's property, not theirs.
          cargo build --workspace --exclude sailing-compio --exclude sailing-reactor --target ${{ matrix.target }}

  # Verify the declared MSRV (rust-version in Cargo.toml) actually compiles the library and its
  # feature surface — without this job the declaration is aspirational.
  msrv:
    name: msrv (1.91)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Install protoc
      uses: arduino/setup-protoc@v3
      with:
        repo-token: ${{ secrets.GITHUB_TOKEN }}
    - name: Install MSRV toolchain
      run: rustup toolchain install 1.91 --no-self-update && rustup default 1.91
    - name: Check sailing-proto on the MSRV (default + tls + quic)
      run: |
        cargo check -p sailing-proto
        cargo check -p sailing-proto --features tls
        cargo check -p sailing-proto --features quic

  # Prove the no_std core (sailing-proto) links on a real bare-metal target with only `alloc` and
  # no `std`. Any accidental std dependency fails to build here.
  no-std:
    name: no-std (bare-metal + alloc)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Install protoc
      uses: arduino/setup-protoc@v3
      with:
        repo-token: ${{ secrets.GITHUB_TOKEN }}
    - name: Install Rust
      run: rustup update stable --no-self-update && rustup default stable && rustup component add clippy
    - name: Add bare-metal no_std target
      run: rustup target add thumbv7em-none-eabi
    - name: Build sailing-proto (no_std + alloc) on bare metal
      run: cargo build -p sailing-proto --no-default-features --features alloc --target thumbv7em-none-eabi
    - name: Build sailing-proto (no_std + alloc + tcp transport) on bare metal
      # The plain-TCP stream transport is documented as no_std-capable; prove it links bare-metal.
      run: cargo build -p sailing-proto --no-default-features --features alloc,tcp --target thumbv7em-none-eabi
    - name: Clippy sailing-proto (no_std + alloc)
      run: cargo clippy -p sailing-proto --no-default-features --features alloc,tcp -- -D warnings

  build:
    name: build
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v6
    - name: Install protoc
      uses: arduino/setup-protoc@v3
      with:
        repo-token: ${{ secrets.GITHUB_TOKEN }}
    - name: Cache cargo build and registry
      uses: actions/cache@v6
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-build-${{ hashFiles('Cargo.toml', '*/Cargo.toml', 'tests/*/Cargo.toml') }}
        restore-keys: |
          ${{ runner.os }}-build-
    - name: Install Rust
      # --no-self-update is necessary because the windows environment cannot self-update rustup.exe.
      run: rustup update stable --no-self-update && rustup default stable
    - name: Install cargo-hack
      run: cargo install cargo-hack
    - name: Run build
      run: cargo hack build --feature-powerset --exclude-features fuzzing --at-least-one-of std,alloc

  test:
    name: test
    strategy:
      # Report every platform's result; a disk or timeout flake on one OS must not cancel the others.
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v6
    - name: Free disk space
      if: runner.os == 'Linux'
      # Reclaim the large preinstalled toolchains the Rust build never touches; the test build is
      # otherwise close enough to the runner's disk ceiling that a transient peak can fail a compile.
      run: |
        sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /usr/local/share/boost /opt/hostedtoolcache/CodeQL 2>/dev/null || true
        df -h /
    - name: Install protoc
      uses: arduino/setup-protoc@v3
      with:
        repo-token: ${{ secrets.GITHUB_TOKEN }}
    - name: Cache cargo build and registry
      uses: actions/cache@v6
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-test-${{ hashFiles('Cargo.toml', '*/Cargo.toml', 'tests/*/Cargo.toml') }}
        restore-keys: |
          ${{ runner.os }}-test-
    - name: Install Rust
      # --no-self-update is necessary because the windows environment cannot self-update rustup.exe.
      run: rustup update stable --no-self-update && rustup default stable
    - name: Install cargo-hack
      run: cargo install cargo-hack
    - name: Per-feature test the core library
      # sailing-proto owns the feature gating (std/alloc/tcp/tls/quic/serde/clap). The full --feature-powerset
      # is 530 combos — 408 of them rebuilding rustls/quinn for a tls/quic variant — which overran the runner's
      # disk and wall-clock. --each-feature instead checks every feature in isolation; the crate requires one of
      # std/alloc, so it runs once per tier with that tier as the --features base (--at-least-one-of is
      # powerset-only). Each feature thus compiles and tests on both the std and the no_std/alloc tier.
      run: |
        cargo hack test -p sailing-proto --each-feature --features std --exclude-features fuzzing
        cargo hack test -p sailing-proto --each-feature --features alloc --exclude-features fuzzing
    - name: Integration, driver, and simulation tests
      # The downstream crates carry no test-relevant feature combinatorics, so each runs ONCE with all
      # features (the reactor loopback needs the agnostic runtime, the simulator's VOPR exercises the wire
      # codec) rather than per powerset combo.
      run: |
        cargo test -p sailing-driver --all-features
        cargo test -p sailing-simulation --all-features
        cargo test -p sailing-compio --all-features
        cargo test -p sailing-reactor --all-features

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    needs:
      - rustfmt
      - clippy
      - build
      - cross
      - test
    steps:
      - uses: actions/checkout@v6
      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install Rust
        run: rustup update nightly && rustup default nightly
      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin
      - name: Cache cargo build and registry
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-coverage-${{ hashFiles('Cargo.toml', '*/Cargo.toml', 'tests/*/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-coverage-
      - name: Run tarpaulin
        env:
          RUSTFLAGS: "--cfg tarpaulin"
        run: cargo tarpaulin --engine llvm --all-features --run-types lib --run-types tests --run-types doctests --workspace --out xml
      - name: Upload to codecov.io
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: ${{ github.repository }}
          fail_ci_if_error: false
