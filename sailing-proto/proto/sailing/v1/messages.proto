// The sailing consensus wire envelope (normative; WIRE.md references this file).
//
// Generic seams: every `bytes` field named `*_id`, the `voters`/`learners`/
// `voters_outgoing`/`learners_next` sets, and `ConfChangeSingle.node_id` carry the
// embedder's NodeId encoded by its `Data` impl (1..=1024 bytes, decoded with
// decode_exact — trailing bytes reject). Entry payloads and snapshot blobs are opaque
// application bytes.
//
// Envelope semantics are protobuf (proto3): absent scalars decode as zero/empty —
// identical in meaning to an explicit zero; duplicate scalars are last-wins while
// duplicate embedded messages MERGE (and a same-variant oneof re-occurrence merges
// too — see WIRE.md for the precise rules); unknown fields are skipped (forward
// compatibility). Sailing's stricter validation —
// set elements strictly ascending by decoded value, id presence and bounds, nanos
// bounds, body presence — is enforced at the wire→programming conversion and
// documented in WIRE.md.

syntax = "proto3";

package sailing.v1;

// One replicated log entry.
message Entry {
  uint64 term = 1;
  uint64 index = 2;
  EntryKind kind = 3;
  // The application command (Normal), the encoded ConfChange (ConfChange), or empty.
  bytes data = 4;
  // The leader's clock when it appended this entry (nanos since the node's monotonic ORIGIN),
  // used ONLY by the LeaseGuard read mode to age the entry across a leader change. Zero (the
  // proto3 default) in every other mode — absent on the wire, so a non-LeaseGuard entry encodes
  // exactly as before. Cross-node comparability requires the driver to anchor each node's ORIGIN
  // to a synchronized epoch (the LeaseGuard bounded-skew assumption); see WIRE.md.
  uint64 timestamp = 5;
  // The LeaseGuard commit-wait window of the appending leader (nanos; the exact
  // lease_duration*(lease_duration+clock_drift_bound)/(lease_duration-clock_drift_bound), see the
  // Config::clock_drift_bound docs): how long a successor must wait, from a lower bound on this
  // entry's creation, before this
  // leader's read-lease has provably expired. Self-describing, so a successor sizes its commit-wait
  // by the MAX window over inherited entries with no assumption about other nodes' config. Zero (the
  // proto3 default) in every other mode — absent on the wire, byte-identical to before.
  uint64 lease_window = 6;
  // The appending leader's SYNCHRONIZED WALL-CLOCK reading (nanos since a cluster-wide epoch) when
  // it appended this entry — used ONLY by the LeaseGuard FAILOVER tier (inherited reads + the precise
  // commit-anchor) to compare a prior leader's stamp to a successor's clock across nodes, which needs
  // bounded clock skew. Distinct from timestamp (5), which is per-node MONOTONIC and never compared
  // cross-node. Zero (the proto3 default) outside the failover tier — absent on the wire, byte-identical
  // to before. See WIRE.md and the 2026-06-14 failover-reads design.
  uint64 wall_timestamp = 7;
}

// Entry discriminant. Zero = Normal so the dominant case is the proto3 default.
enum EntryKind {
  ENTRY_KIND_NORMAL = 0;
  ENTRY_KIND_CONF_CHANGE = 1;
  ENTRY_KIND_EMPTY = 2;
}

// Cluster membership. Each repeated field is a SET: elements are the embedder's
// Data-encoded node ids, required strictly ascending by decoded value (duplicates and
// disorder reject at conversion — one set has one accepted encoding).
message ConfState {
  repeated bytes voters = 1;
  repeated bytes learners = 2;
  repeated bytes voters_outgoing = 3;
  repeated bytes learners_next = 4;
  bool auto_leave = 5;
}

// Snapshot metadata: the compaction boundary and the membership AT that boundary.
message SnapshotMeta {
  uint64 last_index = 1;
  uint64 last_term = 2;
  ConfState conf = 3;
  // The max LeaseGuard commit-wait window (nanos) over the entries this snapshot subsumes — carried
  // so a node that compacts (or installs this snapshot) still bounds any deposed leader's lease on a
  // now-compacted entry. Zero in non-LeaseGuard clusters — absent on the wire, byte-identical to
  // before.
  uint64 max_lease_window = 4;
  // The max per-entry wall_timestamp + lease_window over the entries this snapshot subsumes — the
  // FAILOVER-tier precise commit-anchor's release floor, carried so a successor that compacted (or
  // installed) these entries still bounds a deposed leader's lease on a now-unavailable entry. Paired
  // PER ENTRY (never the max stamp with a different entry's window). Zero outside the failover tier —
  // absent on the wire, byte-identical to before.
  uint64 max_wall_plus_window = 5;
  // The max lease_window over the entries this snapshot subsumes that are LEASE-bearing but
  // WALL-ABSENT (lease_window > 0, wall_timestamp == 0) — the failover precise commit-anchor's
  // mono-frame fallback bound for wall-absent inherited leases, carried so a successor that compacted
  // (or installed) these entries still bounds a deposed leader's lease when no precise wall anchor
  // exists. Folded by the ENTRY property on EVERY node (the exact dual of max_wall_plus_window's
  // wall_timestamp != 0), so the floor is complete across heterogeneous per-node tiers: every
  // wall-absent lease entry contributes regardless of any node's config. It therefore EQUALS
  // max_lease_window in a non-failover LeaseGuard cluster (every entry is wall-absent), but is inert
  // there (only the failover tier reads it). A successor consuming this floor relies on every peer
  // populating it identically — which is exactly why this precise-anchor release bumps LABEL_VERSION
  // (mixed-version nodes that predate the consumed floors reject at the handshake).
  uint64 max_unwalled_lease_window = 6;
}

// Log replication / heartbeat-with-entries.
message AppendEntries {
  uint64 term = 1;
  bytes leader_id = 2;
  uint64 prev_log_index = 3;
  uint64 prev_log_term = 4;
  repeated Entry entries = 5;
  uint64 leader_commit = 6;
}

message AppendResp {
  uint64 term = 1;
  bytes from_id = 2;
  bool reject = 3;
  uint64 reject_hint_index = 4;
  uint64 reject_hint_term = 5;
  uint64 match_index = 6;
}

// Vote / PreVote request.
message RequestVote {
  uint64 term = 1;
  bytes candidate_id = 2;
  uint64 last_log_index = 3;
  uint64 last_log_term = 4;
  bool pre_vote = 5;
  bool leader_transfer = 6;
}

message VoteResp {
  uint64 term = 1;
  bytes from_id = 2;
  bool pre_vote = 3;
  bool reject = 4;
}

message Heartbeat {
  uint64 term = 1;
  bytes leader_id = 2;
  uint64 commit = 3;
  // ReadIndex correlation context (opaque; empty when the round confirms no read).
  bytes context = 4;
  uint64 lease_round = 5;
}

message HeartbeatResp {
  uint64 term = 1;
  bytes from_id = 2;
  bytes context = 3;
  uint64 lease_round = 4;
  // The lease-support promise window. nanos must be < 1_000_000_000, validated at
  // conversion BEFORE narrowing - the field is uint64 so an oversized varint is seen
  // and rejected rather than silently truncated to 32 bits (protobuf uint32 decoding
  // truncates by spec, which would make the bound unenforceable at the envelope).
  uint64 lease_support_secs = 5;
  uint64 lease_support_nanos = 6;
}

// Leader -> follower: install a snapshot (the follower is too far behind).
message InstallSnapshot {
  uint64 term = 1;
  bytes leader_id = 2;
  SnapshotMeta snapshot = 3;
  bytes data = 4;
}

message SnapshotResp {
  uint64 term = 1;
  bytes from_id = 2;
  bool reject = 3;
  uint64 match_index = 4;
}

// Leader -> transfer target: campaign NOW (bypasses the pre-vote lease).
message TimeoutNow {
  uint64 term = 1;
  bytes leader_id = 2;
}

// Follower -> leader: confirm a linearizable read (forwarded read-index).
message ReadIndex {
  uint64 term = 1;
  bytes from_id = 2;
  bytes context = 3;
}

message ReadIndexResp {
  uint64 term = 1;
  bytes from_id = 2;
  uint64 index = 3;
  bytes context = 4;
  bool reject = 5;
}

// A single configuration change step.
message ConfChangeSingle {
  ConfChangeType change_type = 1;
  bytes node_id = 2;
}

// Conf-change discriminant. Zero = AddNode so the dominant case is the proto3 default.
enum ConfChangeType {
  CONF_CHANGE_TYPE_ADD_NODE = 0;
  CONF_CHANGE_TYPE_REMOVE_NODE = 1;
  CONF_CHANGE_TYPE_ADD_LEARNER_NODE = 2;
}

// The v1 (single-step) conf change, carried as an Entry payload.
message ConfChange {
  ConfChangeType change_type = 1;
  bytes node_id = 2;
  bytes context = 3;
}

// The v2 (joint-capable) conf change, carried as an Entry payload.
message ConfChangeV2 {
  ConfChangeTransition transition = 1;
  repeated ConfChangeSingle changes = 2;
  bytes context = 3;
}

// Joint-consensus transition policy.
enum ConfChangeTransition {
  CONF_CHANGE_TRANSITION_AUTO = 0;
  CONF_CHANGE_TRANSITION_IMPLICIT = 1;
  CONF_CHANGE_TRANSITION_EXPLICIT = 2;
}

// The consensus RPC envelope: exactly one frame carries exactly one Message.
// An absent body rejects at conversion (parity with the prior unknown-tag reject).
message Message {
  oneof body {
    AppendEntries append_entries = 1;
    AppendResp append_resp = 2;
    RequestVote request_vote = 3;
    VoteResp vote_resp = 4;
    Heartbeat heartbeat = 5;
    HeartbeatResp heartbeat_resp = 6;
    InstallSnapshot install_snapshot = 7;
    SnapshotResp snapshot_resp = 8;
    TimeoutNow timeout_now = 9;
    ReadIndex read_index = 10;
    ReadIndexResp read_index_resp = 11;
  }
}
