[package]
name = "sailing-proto"
description = "Sans-I/O Raft consensus core"
version = "0.0.0"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true

[features]
default = ["std"]
# `std` and `alloc` are INDEPENDENT (never `std = ["alloc"]`): `std` layers each dependency's std
# feature; `alloc` is the no_std heap tier (the deps use `alloc` automatically under
# `default-features = false`, so there is nothing to layer). The crate requires at least one.
std = ["bytes/std", "thiserror/std", "derive_more/std"]
alloc = []

[dependencies]
bytes.workspace = true
thiserror.workspace = true
derive_more.workspace = true

[lints]
workspace = true

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]
